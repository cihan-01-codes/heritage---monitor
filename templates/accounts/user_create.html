{% extends 'base.html' %}
{% block content %}
<div class="page-header">
    <h2>Create New User</h2>
    <p>Pre-seed a new system account</p>
</div>

{% if error %}
<div class="error-box">{{ error }}</div>
{% endif %}

<div class="card" style="max-width: 520px;">
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <div class="form-group">
            <label>Role</label>
            <select name="role">
                <option value="Admin">Admin</option>
                <option value="Antiquities">Antiquities</option>
                <option value="Partner">Partner</option>
                <option value="Owner">Owner</option>
            </select>
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" name="phone_number" placeholder="+255700000000">
        </div>
        <div style="display:flex; gap:1rem; margin-top:1.5rem;">
            <button type="submit" class="btn-login" style="width:auto; padding: 0.6rem 2rem;">Create User</button>
            <a href="/users/" class="btn-cancel">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
