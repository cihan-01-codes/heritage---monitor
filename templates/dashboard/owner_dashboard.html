{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="page-header">
    <h2>Building Owner Dashboard</h2>
    <p>Your buildings at a glance</p>
</div>

<div class="card" style="margin-bottom:1.5rem">
    <h3>My Buildings</h3>
    <div id="buildings-list">Loading...</div>
</div>

<div class="charts-grid">
    <div class="card">
        <h3>Temperature Trend</h3>
        <canvas id="tempChart"></canvas>
    </div>
    <div class="card">
        <h3>Humidity Trend</h3>
        <canvas id="humidChart"></canvas>
    </div>
    <div class="card">
        <h3>Vibration Trend</h3>
        <canvas id="ownerVibChart"></canvas>
    </div>
</div>

<script src="{% static 'js/dashboard.js' %}"></script>
<script>loadOwnerDashboard();</script>
{% endblock %}
