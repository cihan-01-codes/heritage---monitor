{% extends 'base.html' %}
{% block content %}
<div class="page-header">
    <h2>Edit Building — {{ building.name }}</h2>
</div>

<div class="card" style="max-width:520px">
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Building Name</label>
            <input type="text" name="name" value="{{ building.name }}" required>
        </div>
        <div class="form-group">
            <label>GPS Location</label>
            <input type="text" name="location_gps" value="{{ building.location_gps }}" required>
        </div>
        <div class="form-group">
            <label>Assign Owner</label>
            <select name="user_id" required>
                {% for owner in owners %}
                <option value="{{ owner.id }}" {% if owner == building.user %}selected{% endif %}>
                    {{ owner.username }} ({{ owner.email }})
                </option>
                {% endfor %}
            </select>
        </div>
        <div style="display:flex; gap:1rem; margin-top:1.5rem;">
            <button type="submit" class="btn-login" style="width:auto; padding:0.6rem 2rem;">Save Changes</button>
            <a href="/buildings/" class="btn-cancel">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
