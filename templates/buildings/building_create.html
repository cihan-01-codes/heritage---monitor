{% extends 'base.html' %}
{% block content %}
<div class="page-header">
    <h2>Add Building</h2>
    <p>Register a new heritage site</p>
</div>

{% if error %}
<div class="error-box">{{ error }}</div>
{% endif %}

<div class="card" style="max-width:520px">
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Building Name</label>
            <input type="text" name="name" required placeholder="e.g. Great Pyramid Site">
        </div>
        <div class="form-group">
            <label>GPS Location</label>
            <input type="text" name="location_gps" required placeholder="e.g. -29.9792, 31.1342">
        </div>
        <div class="form-group">
            <label>Assign Owner</label>
            <select name="user_id" required>
                <option value="">-- Select Owner --</option>
                {% for owner in owners %}
                <option value="{{ owner.id }}">{{ owner.username }} ({{ owner.email }})</option>
                {% endfor %}
            </select>
        </div>
        <div style="display:flex; gap:1rem; margin-top:1.5rem;">
            <button type="submit" class="btn-login" style="width:auto; padding:0.6rem 2rem;">Create Building</button>
            <a href="/buildings/" class="btn-cancel">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
