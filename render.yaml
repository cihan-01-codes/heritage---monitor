services:
  - type: web
    name: heritage-monitor
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn heritage_core.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.13
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: DATABASE_URL
        fromDatabase:
          name: heritage-db
          property: connectionString

databases:
  - name: heritage-db
    plan: free